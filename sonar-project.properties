# Configuration SonarQube pour Deploy Board
# Utilisée par le stage « Sonar » du Jenkinsfile (sonar-scanner)

sonar.projectKey=deploy-board
sonar.projectName=Deploy Board
sonar.projectVersion=1.0

# Sources analysées (backend Node + frontend React)
sonar.sources=backend,frontend/src

# Exclusions : dépendances, build, tests et scripts de vérification
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/coverage/**,**/*.test.js,backend/test-*.js,backend/demo-*.js,backend/services/test-services.js

# Tests et couverture (rapport lcov si généré par npm test)
sonar.tests=backend/tests
sonar.test.inclusions=**/*.test.js
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Encodage
sonar.sourceEncoding=UTF-8
